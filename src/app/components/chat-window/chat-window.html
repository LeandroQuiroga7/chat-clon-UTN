@if (activeChat(); as chat) {
  <div class="chat-container">
    <header class="chat-header">
      <button class="back-btn" routerLink="/">
        ←
      </button>

      <div class="avatar-container">
        <img [src]="chat.avatar" alt="avatar">
      </div>
      <span class="contact-name">{{ chat.contactName }}</span>
    </header>

    <div class="messages-list">
      @for (msg of chat.messages; track $index) {
        <div class="message-bubble" [ngClass]="msg.sender === 'me' ? 'mine' : 'theirs'">
          <p>{{ msg.text }}</p>
          <span class="time">{{ msg.timestamp }}</span>
        </div>
      }
    </div>

    <footer class="chat-footer">
      <input type="text" 
             [(ngModel)]="nuevoMensaje" 
             placeholder="Escribe un mensaje..." 
             (keyup.enter)="enviarMensaje()">
      <button class="send-btn" [disabled]="!nuevoMensaje.trim()" (click)="enviarMensaje()">➤</button>
    </footer>
  </div>
} @else {
  <div class="empty-state">
    <p>Seleccioná un chat para empezar a mensajear</p>
  </div>
}
