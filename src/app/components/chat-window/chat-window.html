@if (activeChat()) {
  <div class="chat-container">
    <header class="chat-header">
      <div class="avatar-container">
        <img [src]="activeChat().avatar" alt="avatar">
      </div>
      <span class="contact-name">{{ activeChat().contactName }}</span>
    </header>

    <div class="messages-list">
      @for (msg of activeChat().messages; track $index) {
        <div class="message-bubble" [ngClass]="msg.sender === 'me' ? 'mine' : 'theirs'">
          <p>{{ msg.text }}</p>
          <span class="time">{{ msg.timestamp | date:'HH:mm' }}</span>
        </div>
      }
    </div>

    <footer class="chat-footer">
      <input type="text" 
             [(ngModel)]="nuevoMensaje" 
             placeholder="Escribe un mensaje..." 
             (keyup.enter)="enviarMensaje()">
      <button class="send-btn" (click)="enviarMensaje()">➤</button>
    </footer>
  </div>
} @else {
  <div class="empty-state">
    <p>Seleccioná un chat</p>
  </div>
}
